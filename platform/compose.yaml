# halfpap.io — Caddy container. Content is mounted read-only (Platform ⊥ Application).
services:
  caddy:
    image: caddy:2-alpine
    container_name: halfpap-io-caddy
    restart: unless-stopped
    # Host port 8082 → container 8080. Port 8080 on the deploy host is held by the
    # existing Ghost container (kept running during cutover); Caddy gets its own.
    ports:
      - "8082:8080"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ../sites/www:/srv/www:ro
      - ../sites/henning:/srv/henning:ro
      - ../sites/maclist:/srv/maclist:ro
